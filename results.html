<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLESTE — Résultats</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    /* ── Tableau résultats ── */
    .results-wrapper { overflow-x: auto; padding-bottom: 16px; }
    .results-table {
      border-collapse: collapse;
      min-width: 1600px;
      font-size: .78rem;
      width: 100%;
    }
    .results-table th, .results-table td {
      padding: 5px 7px;
      border: 1px solid var(--border);
      white-space: nowrap;
      text-align: right;
    }
    .results-table th { background: var(--forest-dk); color: var(--cream); font-weight: 600; text-align: center; }
    .results-table .col-label { text-align: left; background: var(--cream); font-weight: 500; min-width: 160px; position: sticky; left: 0; z-index: 2; border-right: 2px solid var(--border-dk); }
    .results-table .section-header td { background: var(--forest); color: white; font-weight: 700; font-size: .8rem; letter-spacing: .06em; text-align: left; padding: 8px 10px; }
    .results-table .section-header .section-label { min-width: 180px; font-size: .85rem; letter-spacing: .08em; }
    .results-table .section-header .section-col { text-align: center; font-size: .7rem; font-weight: 600; letter-spacing: .04em; opacity: .75; padding: 8px 4px; white-space: nowrap; }
    .results-table .section-header .section-col-T { opacity: .65; }
    .results-table .section-header .section-col-A { opacity: .9; }
    .results-table .section-header .section-col-C { opacity: .75; font-style: italic; }
    .results-table .section-header .section-col-Y1 { opacity: .6; }
    /* Taux d'occupation Budget — input avec suffixe % */
    .occ-budget-cell { padding: 2px 4px !important; }
    .occ-input-wrap { display: flex; align-items: center; gap: 2px; }
    .occ-input-wrap input { flex: 1; min-width: 0; }
    .occ-pct-suffix { font-size: .8rem; font-weight: 600; color: var(--forest); opacity: .8; white-space: nowrap; }
    .results-table .auto-row td { background: rgba(16,86,91,.05); font-style: italic; }
    .results-table .auto-row .col-label { font-style: normal; font-weight: 600; color: var(--forest); }
    .results-table input[type=number] {
      width: 72px; padding: 3px 5px;
      border: 1px solid transparent; border-radius: 3px;
      background: transparent; text-align: right;
      font-family: var(--font-mono); font-size: .78rem;
      color: var(--charcoal);
    }
    .results-table input[type=number]:focus { border-color: var(--forest); background: white; outline: none; }
    .results-table .col-T  { background: rgba(108,125,54,.06); }
    .results-table .col-A  { background: white; }
    .results-table .col-C  { background: rgba(200,106,74,.06); }
    .results-table .col-Y1 { background: rgba(138,138,138,.06); color: var(--muted); }
    .results-table .month-group { border-left: 2px solid var(--border-dk); }
    .month-header { background: var(--forest-dk) !important; color: var(--cream) !important; text-align: center !important; font-weight: 700 !important; }
    .sub-header th { background: var(--cream-dk); color: var(--charcoal-lt); font-size: .68rem; font-weight: 600; }
    .computed-val { font-weight: 600; font-family: var(--font-mono); }
    .year-selector { display: flex; align-items: center; gap: 12px; }
    .year-btn { width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition); }
    .year-btn:hover { background:var(--forest);color:white;border-color:var(--forest); }
    .year-display { font-family:var(--font-display);font-size:1.4rem;font-weight:600;color:var(--forest);min-width:60px;text-align:center; }
    .saving-indicator { font-size:.75rem;color:var(--muted);opacity:0;transition:.3s; }
    .saving-indicator.show { opacity:1; }
  </style>
</head>
<body>
<div class="app-layout">
  <header class="app-header">
    <div class="logo">SOL<span>ESTE</span></div>
    <div class="header-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">–</div>
        <span id="user-name">–</span>
      </div>
      <button class="btn btn-ghost btn-sm" id="logout-btn" style="color:rgba(245,240,232,.7);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </div>
  </header>
  <nav class="app-sidebar">
    <div class="nav-section">Navigation</div>
    <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Tableau de bord</a>
    <div class="nav-section">Modules</div>
    <a href="database.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>Base articles</a>
    <a href="suppliers.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Fournisseurs</a>
    <a href="orders.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Commandes</a>
    <a href="menu.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Menu engineering</a>
    <a href="inventory.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Inventaire</a>
    <div class="nav-section">Analyse</div>
    <a href="results.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Résultats</a>
    <a href="staffcost.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Staff Cost</a>
    <a href="foodcost.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2"/><path d="M18.5 15a2.5 2.5 0 010 5H21v3h-5v-3h2.5a2.5 2.5 0 000-5H16v-5h5v5h-2.5z"/></svg>Food Cost</a>
    <div class="nav-section">Configuration</div>
    <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>Réglages</a>
  </nav>

  <main class="app-main">
    <div class="page-header">
      <div>
        <div class="page-title">Résultats</div>
        <div class="page-subtitle">Tableau de bord mensuel — ROOM · F&amp;B · GOP</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="saving-indicator" id="saving-ind">💾 Sauvegarde…</span>
        <div class="year-selector">
          <button class="year-btn" id="btn-prev-year">‹</button>
          <div class="year-display" id="year-display">2026</div>
          <button class="year-btn" id="btn-next-year">›</button>
        </div>
      </div>
    </div>

    <!-- Sélecteur mois mobile -->
    <div class="results-month-selector-mob" id="mob-month-sel" style="display:none;">
      <button onclick="mobPrevMonth()">‹</button>
      <span id="mob-month-label"></span>
      <button onclick="mobNextMonth()">›</button>
    </div>

    <div class="results-wrapper">
      <table class="results-table" id="results-table">
        <thead id="results-thead"></thead>
        <tbody id="results-tbody"></tbody>
      </table>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { initEstablishment, getActiveEstId, setActiveEstId, estDocKey } from './js/establishment.js';
import { initMobileNav } from './js/mobile.js';
import { renderEstSelector } from './js/est-header.js';
import { toast } from './js/utils.js';
import { getSettings } from './js/settings.js';
import { MONTHS, docKey, fmtEur, fmtPct, fmtNum, calcRoom, calcFnb, calcStaffCostCorrection } from './js/kpi.js';
const eKey = (y, m) => estDocKey(window.__estId || 'panoramique', y, m);

window.signOut = signOut;
let currentYear = new Date().getFullYear();
let hourlyCost  = 0;
let yearData    = {}; // { "2026_01": {...}, ... }
let corrData    = {}; // staff cost corrigé
let saveTimer   = null;

// ── Auth ─────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  const dn = user.displayName || user.email.split('@')[0];
  document.getElementById('user-avatar').textContent = dn.substring(0,2).toUpperCase();
  document.getElementById('user-name').textContent   = dn;
  // ── Établissement actif ──────────────────────────────────
  const estInfo = await initEstablishment(user.email);
  window.__estId   = estInfo.estId   || 'panoramique';
  initMobileNav('results.html');
  window.__estName = estInfo.estName || 'Le Panoramique';
  window.__isMaster = estInfo.isMaster || false;
  renderEstSelector(estInfo.establishments, window.__estId, null);

  const s = await getSettings().catch(() => ({}));
  hourlyCost = parseFloat(s.hourlyCost) || 0;
  await loadYear(currentYear);
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await signOut(auth); window.location.href = 'index.html';
});

// ── Année ─────────────────────────────────────────────────────
document.getElementById('btn-prev-year').addEventListener('click', () => { currentYear--; loadYear(currentYear); });
document.getElementById('btn-next-year').addEventListener('click', () => { currentYear++; loadYear(currentYear); });

let y1YearData = {};

async function loadYear(year) {
  document.getElementById('year-display').textContent = year;
  yearData = {}; corrData = {}; y1YearData = {};
  for (let m = 0; m < 12; m++) {
    const key  = eKey(year,   m);
    const key1 = eKey(year-1, m);
    const [res, sc, res1] = await Promise.all([
      getDoc(doc(db, 'results',   key)).then(s  => s.exists()  ? s.data()  : {}).catch(() => ({})),
      getDoc(doc(db, 'staffcost', key)).then(s  => s.exists()  ? s.data()  : {}).catch(() => ({})),
      getDoc(doc(db, 'results',   key1)).then(s => s.exists() ? s.data() : {}).catch(() => ({})),
    ]);
    yearData[key]   = res;
    corrData[key]   = sc;
    y1YearData[key1] = res1;
  }
  renderTable(year);
}

// ── Mois actif mobile ──────────────────────────────────────
let mobMonth = new Date().getMonth() === 0 ? 11 : new Date().getMonth() - 1; // mois précédent

window.mobPrevMonth = function() {
  mobMonth = (mobMonth - 1 + 12) % 12;
  renderTable(currentYear);
};
window.mobNextMonth = function() {
  mobMonth = (mobMonth + 1) % 12;
  renderTable(currentYear);
};

// ── Rendu tableau ──────────────────────────────────────────
function renderTable(year) {
  const thead = document.getElementById('results-thead');
  const tbody = document.getElementById('results-tbody');
  const isMobile = window.innerWidth <= 768;
  const mobSel   = document.getElementById('mob-month-sel');

  if (isMobile) {
    // ── Vue mobile : 1 mois, 4 colonnes ──────────────────
    mobSel.style.display = 'flex';
    document.getElementById('mob-month-label').textContent = `${MONTHS[mobMonth]} ${year}`;

    thead.innerHTML = `<tr>
      <th class="col-label">Indicateur</th>
      <th class="col-T month-group sub-header">Budget</th>
      <th class="col-A sub-header">Actual</th>
      <th class="col-C sub-header">Corrigé</th>
      <th class="col-Y1 sub-header">Y-1</th>
    </tr>`;

    const rows = buildRows(year);
    tbody.innerHTML = rows.map(r => renderRowMob(r, year, mobMonth)).join('');
    return;
  }

  // ── Vue desktop : 12 mois ─────────────────────────────
  mobSel.style.display = 'none';
  let hRow1 = '<tr><th class="col-label" rowspan="2">Indicateur</th>';
  let hRow2 = '<tr>';
  for (let m = 0; m < 12; m++) {
    hRow1 += `<th colspan="4" class="month-group month-header">${MONTHS[m]}</th>`;
    hRow2 += `<th class="col-T sub-header month-group">Budget</th><th class="col-A sub-header">Actual</th><th class="col-C sub-header">Corrigé</th><th class="col-Y1 sub-header">Y-1</th>`;
  }
  thead.innerHTML = hRow1 + '</tr>' + hRow2 + '</tr>';

  // Corps
  const rows = buildRows(year);
  tbody.innerHTML = rows.map(r => renderRow(r, year)).join('');
}

// ── Rendu ligne mobile (1 mois) ────────────────────────────
function renderRowMob(row, year, m) {
  if (row.type === 'section') {
    return `<tr class="section-header">
      <td class="section-label">${row.label}</td>
      <td class="section-col section-col-T month-group">Bgt</td>
      <td class="section-col section-col-A">Act</td>
      <td class="section-col section-col-C">Cor</td>
      <td class="section-col section-col-Y1">Y-1</td>
    </tr>`;
  }

  const key  = eKey(year, m);
  const key1 = eKey(year - 1, m);
  const d    = yearData[key]?.[row.section] || {};
  const dT   = yearData[key]?.[row.section + '_target'] || {};
  const dY1  = y1YearData[key1]?.[row.section] || {};
  const sc   = corrData[key] || {};

  let cells = `<td class="col-label">${row.label}</td>`;

  if (row.type === 'input') {
    const tVal = dT[row.field] ?? '';
    cells += `<td class="col-T month-group"><input type="number" step="any" value="${tVal}" data-year="${year}" data-month="${m}" data-section="${row.section}_target" data-field="${row.field}" onchange="handleInput(this)"></td>`;
    const aVal = d[row.field] ?? '';
    cells += `<td class="col-A"><input type="number" step="any" value="${aVal}" data-year="${year}" data-month="${m}" data-section="${row.section}" data-field="${row.field}" onchange="handleInput(this)"></td>`;
    const corrVal = getCorrectedValue(sc, row.section, row.field, d);
    cells += `<td class="col-C"><span class="computed-val">${corrVal !== null ? fmt(corrVal, row.fmt) : '—'}</span></td>`;
    const y1Val = dY1[row.field];
    cells += `<td class="col-Y1">${y1Val !== undefined && y1Val !== 0 ? fmt(y1Val, row.fmt) : '—'}</td>`;
  } else if (row.type === 'auto_budget_input') {
    const tVal = dT[row.field] ?? '';
    cells += `<td class="col-T month-group occ-budget-cell"><div class="occ-input-wrap"><input type="number" step="0.1" min="0" max="100" value="${tVal}" data-year="${year}" data-month="${m}" data-section="${row.section}_target" data-field="${row.field}" onchange="handleInput(this)"><span class="occ-pct-suffix">%</span></div></td>`;
    const calcA  = getAutoValue(d, row.section, row.field);
    const corrSc = getCorrectedCalcValue(sc, row.section, row.field, d);
    const calcY1 = getAutoValue(dY1, row.section, row.field);
    const budgetNum = parseFloat(tVal);
    const actualNum = (calcA !== null) ? parseFloat(calcA) : null;
    let occColor = 'inherit';
    if (actualNum !== null && !isNaN(actualNum) && !isNaN(budgetNum) && budgetNum > 0) {
      occColor = actualNum >= budgetNum ? 'var(--success)' : 'var(--danger)';
    }
    cells += `<td class="col-A auto-row"><span class="computed-val" style="color:${occColor};font-weight:${occColor!=='inherit'?'600':'400'}">${fmt(calcA, row.fmt)}</span></td>`;
    cells += `<td class="col-C auto-row"><span class="computed-val">${corrSc !== null ? fmt(corrSc, row.fmt) : '—'}</span></td>`;
    cells += `<td class="col-Y1 auto-row">${fmt(calcY1, row.fmt)}</td>`;
  } else {
    const calcA  = getAutoValue(d, row.section, row.field);
    const calcT  = getAutoValue(dT, row.section, row.field);
    const corrSc = getCorrectedCalcValue(sc, row.section, row.field, d);
    const color  = row.colorFn === 'staffcost' ? staffCostColorLocal(calcA) : '';
    cells += `<td class="col-T month-group auto-row"><span class="computed-val">${fmt(calcT, row.fmt)}</span></td>`;
    cells += `<td class="col-A auto-row"><span class="computed-val" style="color:${color}">${fmt(calcA, row.fmt)}</span></td>`;
    cells += `<td class="col-C auto-row"><span class="computed-val">${corrSc !== null ? fmt(corrSc, row.fmt) : '—'}</span></td>`;
    const calcY1 = getAutoValue(dY1, row.section, row.field);
    cells += `<td class="col-Y1 auto-row">${fmt(calcY1, row.fmt)}</td>`;
  }

  const cls = (row.type === 'auto' || row.type === 'auto_budget_input') ? 'auto-row' : '';
  return `<tr class="${cls}">${cells}</tr>`;
}

// ── Définition des lignes ──────────────────────────────────
function buildRows(year) {
  const rows = [];

  // ── ROOM ──
  rows.push({ type: 'section', label: '🏨 ROOM' });
  rows.push({ type: 'input', section: 'room', field: 'incomes',       label: 'Incomes (CA total hôtel)', fmt: 'eur' });
  rows.push({ type: 'input', section: 'room', field: 'payrollFixed',  label: 'Payroll fixe', fmt: 'eur' });
  rows.push({ type: 'input', section: 'room', field: 'payrollVar',    label: 'Payroll variable', fmt: 'eur' });
  rows.push({ type: 'input', section: 'room', field: 'interim',       label: 'Intérim', fmt: 'eur' });
  rows.push({ type: 'auto',  section: 'room', field: 'staffCostPct',  label: 'Staff cost %', fmt: 'pct', colorFn: 'staffcost' });
  rows.push({ type: 'input', section: 'room', field: 'roomRevenue',   label: 'CA chambres uniquement', fmt: 'eur' });
  rows.push({ type: 'input', section: 'room', field: 'roomsSold',     label: 'Chambres louées', fmt: 'num' });
  rows.push({ type: 'input', section: 'room', field: 'roomsAvail',    label: 'Chambres disponibles', fmt: 'num' });
  rows.push({ type: 'auto',  section: 'room', field: 'arr',           label: 'ARR', fmt: 'eur2' });
  rows.push({ type: 'auto',  section: 'room', field: 'revpar',        label: 'RevPAR', fmt: 'eur2' });
  rows.push({ type: 'auto_budget_input', section: 'room', field: 'occupancy', label: "Taux d'occupation", fmt: 'pct' });

  // ── F&B ──
  rows.push({ type: 'section', label: '🍽 F&B' });
  rows.push({ type: 'input', section: 'fnb', field: 'incomes',       label: 'Incomes', fmt: 'eur' });
  rows.push({ type: 'input', section: 'fnb', field: 'payrollFixed',  label: 'Payroll fixe', fmt: 'eur' });
  rows.push({ type: 'input', section: 'fnb', field: 'payrollVar',    label: 'Payroll variable', fmt: 'eur' });
  rows.push({ type: 'input', section: 'fnb', field: 'interim',       label: 'Intérim', fmt: 'eur' });
  rows.push({ type: 'auto',  section: 'fnb', field: 'staffCostPct',  label: 'Staff cost %', fmt: 'pct', colorFn: 'staffcost' });

  // ── GOP ──
  rows.push({ type: 'section', label: '📊 GOP' });
  rows.push({ type: 'input', section: 'gop', field: 'gop', label: 'GOP (€)', fmt: 'eur' });

  return rows;
}

function renderRow(row, year) {
  if (row.type === 'section') {
    let cells = `<td class="section-label">${row.label}</td>`;
    for (let m = 0; m < 12; m++) {
      cells += `<td class="section-col section-col-T month-group">Bgt</td><td class="section-col section-col-A">Act</td><td class="section-col section-col-C">Cor</td><td class="section-col section-col-Y1">Y-1</td>`;
    }
    return `<tr class="section-header">${cells}</tr>`;
  }

  let cells = `<td class="col-label">${row.label}</td>`;

  for (let m = 0; m < 12; m++) {
    const key   = eKey(year, m);
    const key1  = eKey(year - 1, m);
    const d     = yearData[key]?.[row.section] || {};
    const dT    = yearData[key]?.[row.section + '_target'] || {};
    const dY1   = y1YearData[key1]?.[row.section] || {};
    const sc    = corrData[key] || {};

    if (row.type === 'input') {
      // Budget (Target)
      const tVal = dT[row.field] ?? '';
      cells += `<td class="col-T month-group"><input type="number" step="any" value="${tVal}" data-year="${year}" data-month="${m}" data-section="${row.section}_target" data-field="${row.field}" onchange="handleInput(this)"></td>`;
      // Actual
      const aVal = d[row.field] ?? '';
      cells += `<td class="col-A"><input type="number" step="any" value="${aVal}" data-year="${year}" data-month="${m}" data-section="${row.section}" data-field="${row.field}" onchange="handleInput(this)"></td>`;
      // Corrigé (lecture seule — calculé depuis staffcost)
      const corrVal = getCorrectedValue(sc, row.section, row.field, d);
      cells += `<td class="col-C"><span class="computed-val">${corrVal !== null ? fmt(corrVal, row.fmt) : '—'}</span></td>`;
      // Y-1 (lecture seule — chargé depuis Firestore année précédente)
      const y1Val = dY1[row.field];
      cells += `<td class="col-Y1">${y1Val !== undefined && y1Val !== 0 ? fmt(y1Val, row.fmt) : '—'}</td>`;
    } else if (row.type === 'auto_budget_input') {
      // Budget = saisie manuelle (ex: taux d'occupation cible)
      // Actual / Corrigé / Y-1 = calculé automatiquement
      const tVal = dT[row.field] ?? '';
      // Budget : input + suffixe % dans une cellule wrapper
      cells += `<td class="col-T month-group occ-budget-cell">
        <div class="occ-input-wrap">
          <input type="number" step="0.1" min="0" max="100" value="${tVal}" data-year="${year}" data-month="${m}" data-section="${row.section}_target" data-field="${row.field}" onchange="handleInput(this)">
          <span class="occ-pct-suffix">%</span>
        </div>
      </td>`;
      const calcA  = getAutoValue(d, row.section, row.field);
      const corrSc = getCorrectedCalcValue(sc, row.section, row.field, d);
      const calcY1 = getAutoValue(dY1, row.section, row.field);
      // Actual : vert si >= Budget, rouge si < Budget
      const budgetNum = parseFloat(tVal);
      const actualNum = (calcA !== null && calcA !== undefined) ? parseFloat(calcA) : null;
      let occColor = 'inherit';
      if (actualNum !== null && !isNaN(actualNum) && !isNaN(budgetNum) && budgetNum > 0) {
        occColor = actualNum >= budgetNum ? 'var(--success)' : 'var(--danger)';
      }
      cells += `<td class="col-A auto-row"><span class="computed-val" style="color:${occColor};font-weight:${occColor!=='inherit'?'600':'400'}">${fmt(calcA, row.fmt)}</span></td>`;
      cells += `<td class="col-C auto-row"><span class="computed-val">${corrSc !== null ? fmt(corrSc, row.fmt) : '—'}</span></td>`;
      cells += `<td class="col-Y1 auto-row">${fmt(calcY1, row.fmt)}</td>`;
    } else {
      // Auto-calculé
      const calcA = getAutoValue(d, row.section, row.field);
      const calcT = getAutoValue(dT, row.section, row.field);
      const corrSc = getCorrectedCalcValue(sc, row.section, row.field, d);
      const color = row.colorFn === 'staffcost' ? staffCostColorLocal(calcA) : '';
      cells += `<td class="col-T month-group auto-row"><span class="computed-val">${fmt(calcT, row.fmt)}</span></td>`;
      cells += `<td class="col-A auto-row"><span class="computed-val" style="color:${color}">${fmt(calcA, row.fmt)}</span></td>`;
      cells += `<td class="col-C auto-row"><span class="computed-val">${corrSc !== null ? fmt(corrSc, row.fmt) : '—'}</span></td>`;
      const calcY1 = getAutoValue(dY1, row.section, row.field);
      cells += `<td class="col-Y1 auto-row">${fmt(calcY1, row.fmt)}</td>`;
    }
  }

  const cls = (row.type === 'auto' || row.type === 'auto_budget_input') ? 'auto-row' : '';
  return `<tr class="${cls}">${cells}</tr>`;
}

// ── Valeur calculée ────────────────────────────────────────
function getAutoValue(d, section, field) {
  if (!d || !Object.keys(d).length) return null;
  if (section === 'room') {
    const c = calcRoom(d);
    return c[field] ?? null;
  }
  if (section === 'fnb') {
    const c = calcFnb(d);
    return c[field] ?? null;
  }
  return null;
}

function getCorrectedValue(sc, section, field, actual) {
  // Payroll fixe corrigé = actual.payrollFixed - déduction Staff Cost
  if (field === 'payrollFixed') {
    const scSec = sc?.[section];
    if (!scSec || !Object.keys(scSec).length) return null;
    const { deduction } = calcStaffCostCorrection(scSec, hourlyCost);
    if (!deduction) return null;
    const actualPF = parseFloat(actual?.payrollFixed) || 0;
    return actualPF - deduction;
  }
  // Payroll variable et intérim : pas de correction Staff Cost, on n'affiche rien
  return null;
}

function getCorrectedCalcValue(sc, section, field, actual) {
  const scSec = sc?.[section];
  if (!scSec || !Object.keys(scSec).length) return null;
  const { deduction } = calcStaffCostCorrection(scSec, hourlyCost);
  if (!deduction && deduction !== 0) return null;
  const corrPF = (parseFloat(actual?.payrollFixed) || 0) - deduction;
  const corrD = {
    ...actual,
    payrollFixed: corrPF,
  };
  return getAutoValue(corrD, section, field);
}

function staffCostColorLocal(v) {
  if (v === null || v === undefined) return 'inherit';
  return v < 30 ? 'var(--success)' : v < 40 ? 'var(--warning)' : 'var(--danger)';
}

function fmt(v, type) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (type === 'eur')  return fmtEur(v, 0);
  if (type === 'eur2') return fmtEur(v, 2);
  if (type === 'pct')  return fmtPct(v);
  if (type === 'num')  return fmtNum(v, 0);
  return v;
}

// ── Sauvegarde auto ────────────────────────────────────────
window.handleInput = function(el) {
  const { year, month, section, field } = el.dataset;
  const key = eKey(parseInt(year), parseInt(month));
  if (!yearData[key]) yearData[key] = {};
  if (!yearData[key][section]) yearData[key][section] = {};
  yearData[key][section][field] = parseFloat(el.value) || 0;

  // Rafraîchir les calculs auto dans la même colonne
  refreshAutoRow(parseInt(year), parseInt(month), section);

  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveMonth(parseInt(year), parseInt(month)), 1200);
};

function refreshAutoRow(year, month, section) {
  const key = eKey(year, month);
  const d = yearData[key]?.[section] || {};
  const dT = yearData[key]?.[section + '_target'] || {};
  // Mettre à jour les cellules auto de cette colonne
  document.querySelectorAll(`[data-year="${year}"][data-month="${month}"]`).forEach(el => {
    const col = el.closest('td');
    if (!col) return;
    const row = col.parentElement;
    if (!row.classList.contains('auto-row')) return;
  });
  // Reconstruire les lignes auto — plus simple
  renderTable(year);
}

async function saveMonth(year, month) {
  const key = eKey(year, month);
  const ind = document.getElementById('saving-ind');
  ind.classList.add('show');
  try {
    await setDoc(doc(db, 'results', key), {
      ...yearData[key],
      updatedAt: serverTimestamp()
    }, { merge: true });
  } catch (e) { toast('Erreur sauvegarde', 'error'); }
  finally { setTimeout(() => ind.classList.remove('show'), 1500); }
}

</script>
